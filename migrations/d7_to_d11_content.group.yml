id: d7_to_d11_content
label: 'Drupal 7 to Drupal 11 content'
description: 'Migrates users, taxonomy, files, nodes, paragraphs and redirects from a Drupal 7 source database.'
source_type: 'Drupal 7'
shared_configuration:
  source:
    key: migrate_d7
    constants:
      # Update this path to point at the Drupal 7 sites/default/files directory
      # as it is reachable from the Drupal 11 server. Trailing slash required.
      source_base_path: '/var/www/d7-legacy/sites/default/files/'
      source_private_path: '/var/www/d7-legacy/sites/default/private/'
